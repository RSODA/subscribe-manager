basePath: /
definitions:
  dto.BadRequestErrorResponse:
    properties:
      error:
        example: invalid subscription data
        type: string
    type: object
  dto.CreateSubscriptionRequest:
    properties:
      end_date:
        example: 12-2026
        type: string
      price:
        example: 399
        type: integer
      service_name:
        example: Telegram Premium
        type: string
      start_date:
        example: 07-2026
        type: string
      user_id:
        example: 0e7a1e5f-94f0-4968-838a-e0329b0d556e
        type: string
    type: object
  dto.InternalErrorResponse:
    properties:
      message:
        example: somthing internal error
        type: string
    type: object
  dto.NotFoundErrorResponse:
    properties:
      message:
        example: subscription not found
        type: string
    type: object
  dto.SubscriptionResponse:
    properties:
      end_date:
        example: 12-2026
        type: string
      id:
        example: 14ef01ac-0a66-4f3f-bf59-8f75bc50b6f8
        type: string
      price:
        example: 399
        type: integer
      service_name:
        example: Telegram Premium
        type: string
      start_date:
        example: 07-2026
        type: string
      user_id:
        example: 0e7a1e5f-94f0-4968-838a-e0329b0d556e
        type: string
    type: object
  dto.TotalCostResponse:
    properties:
      total_cost:
        example: 698
        type: integer
    type: object
  dto.UpdateSubscriptionRequest:
    properties:
      end_date:
        example: ""
        type: string
      price:
        example: 299
        type: integer
      service_name:
        example: Yandex Plus
        type: string
      start_date:
        example: 08-2026
        type: string
      user_id:
        example: 0e7a1e5f-94f0-4968-838a-e0329b0d556e
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST сервис для агрегации данных об онлайн подписках
  title: Subscription Manager API
  version: "1.0"
paths:
  /subscriptions:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.SubscriptionResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Список подписок
      tags:
      - subscriptions
    post:
      consumes:
      - application/json
      description: Создает новую запись о подписке
      parameters:
      - description: Данные подписки
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/dto.CreateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.SubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Создать подписку
      tags:
      - subscriptions
  /subscriptions/{id}:
    delete:
      parameters:
      - description: UUID подписки
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.NotFoundErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Удалить подписку
      tags:
      - subscriptions
    get:
      parameters:
      - description: UUID подписки
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.NotFoundErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Получить подписку по ID
      tags:
      - subscriptions
    patch:
      consumes:
      - application/json
      parameters:
      - description: UUID подписки
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: subscription
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.SubscriptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.NotFoundErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Обновить подписку
      tags:
      - subscriptions
  /subscriptions/total:
    get:
      parameters:
      - description: UUID пользователя
        in: query
        name: user_id
        type: string
      - description: Название сервиса
        in: query
        name: service_name
        type: string
      - description: Начало периода MM-YYYY
        in: query
        name: from
        type: string
      - description: Конец периода MM-YYYY
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TotalCostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.BadRequestErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.InternalErrorResponse'
      summary: Суммарная стоимость подписок
      tags:
      - subscriptions
swagger: "2.0"
